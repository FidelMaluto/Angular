<div class="container">
    <h1>Lista de Compras</h1>

    <form #frm="ngForm" class="add-item-form" (ngSubmit)="adicionarItem()">
        <input type="text" id="item" name="item" [(ngModel)]="item" placeholder="Nome do item" />
        <button type="submit">Adicionar</button>
    </form>

    <table>
        <thead>
            <th>#</th>
            <th>Nome</th>
            <th></th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Computador</td>
                <td><input type="checkbox" /></td>
            </tr>
            <tr>
                <td>2</td>
                <td>PC</td>
                <td><input type="checkbox" /></td>
            </tr>
        </tbody>
    </table>
    
</div>
