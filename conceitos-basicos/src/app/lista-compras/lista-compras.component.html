<div class="container">
    <h1>Lista de Compras</h1>

    <form #frm="ngForm" class="add-item-form" (ngSubmit)="adicionarItem()">
        <input type="text" id="item" name="item" [(ngModel)]="item" placeholder="Nome do item" />
        <button type="submit">Adicionar</button>
        <button type="button" (click)="limparLista()">Limpar</button>
    </form>

    <table>
        <thead>
            <th>#</th>
            <th>Nome</th>
            <th></th>
        </thead>
        <tbody>
            @for (elemento of lista; track elemento.id) {
            <tr>
                <td>{{ elemento.id }}</td>
                <td>
                    <span [ngClass]="{' item-riscado' : elemento.comprado}">{{ elemento.nome }}</span>
                </td>
                <td>
                    <input placeholder="..." (click)="riscarItem(elemento)" [checked]="elemento.comprado"
                        type="checkbox" />
                </td>
            </tr>
            } @empty {
            <tr colspan="4">
                Nenhum item adicionado.
            </tr>
            }
        </tbody>
    </table>

</div>
